<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TP/SL Profit Calculator by RIFQI</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* ===== RESET & BASE STYLES ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow-x: hidden;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a0e27 0%, #1a1d3e 100%);
            color: #e0e0e0;
        }

        /* ===== APP CONTAINER ===== */
        .app-container {
            display: flex;
            min-height: 100vh;
            position: relative;
        }

        /* ===== SIDEBAR NAVIGATION ===== */
        .sidebar {
            width: 260px;
            background: rgba(13, 16, 37, 0.95);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(123, 47, 247, 0.2);
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 1000;
            transition: transform 0.3s ease;
            box-shadow: 5px 0 30px rgba(0, 0, 0, 0.3);
        }

        .sidebar-header {
            padding: 25px 20px;
            border-bottom: 1px solid rgba(123, 47, 247, 0.3);
        }

        .sidebar-header h1 {
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(45deg, #00d4ff, #7b2ff7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 5px;
        }

        .sidebar-header p {
            font-size: 0.75rem;
            color: #8b92b8;
        }

        .nav-menu {
            flex: 1;
            padding: 20px 0;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px 20px;
            color: #8b92b8;
            text-decoration: none;
            transition: all 0.3s ease;
            border-left: 3px solid transparent;
            font-weight: 500;
        }

        .nav-item:hover {
            background: rgba(123, 47, 247, 0.1);
            color: #e0e0e0;
        }

        .nav-item.active {
            background: linear-gradient(90deg, rgba(123, 47, 247, 0.2), transparent);
            border-left: 3px solid #7b2ff7;
            color: #7b2ff7;
            font-weight: 600;
        }

        .nav-item.active .nav-icon {
            color: #7b2ff7;
        }

        .nav-icon {
            font-size: 1.2rem;
            width: 24px;
            text-align: center;
        }

        .sidebar-footer {
            padding: 20px;
            border-top: 1px solid rgba(123, 47, 247, 0.3);
            font-size: 0.75rem;
            color: #8b92b8;
            text-align: center;
        }

        /* ===== BOTTOM NAVIGATION (MOBILE) ===== */
        .bottom-nav {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(13, 16, 37, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(123, 47, 247, 0.2);
            z-index: 1000;
            padding: 10px 0;
        }

        .bottom-nav-items {
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .bottom-nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            color: #8b92b8;
            text-decoration: none;
            font-size: 0.7rem;
            padding: 8px 12px;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .bottom-nav-item.active {
            background: rgba(123, 47, 247, 0.2);
            color: #7b2ff7;
        }

        .bottom-nav-icon {
            font-size: 1.2rem;
        }

        /* ===== MAIN CONTENT AREA ===== */
        .main-content {
            flex: 1;
            margin-left: 260px;
            padding: 20px;
            overflow-y: auto;
            max-width: calc(100% - 260px);
            min-height: 100vh;
        }

        /* ===== PAGES STYLING ===== */
        .page {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .page.active {
            display: block;
        }

        .page-header {
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .page-header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(45deg, #00d4ff, #7b2ff7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 5px;
        }

        .page-header p {
            color: #8b92b8;
            font-size: 0.9rem;
        }

        /* ===== OVERVIEW PAGE ===== */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: rgba(26, 29, 62, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            color: #00d4ff;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .card-icon {
            font-size: 1.3rem;
        }

        /* Balance Card */
        .balance-display {
            font-size: 2.5rem;
            font-weight: 700;
            color: #00d4ff;
            margin: 15px 0;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }

        .balance-details {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 20px 0;
        }

        .balance-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .balance-label {
            color: #8b92b8;
            font-size: 0.9rem;
        }

        .balance-value {
            font-weight: 600;
            font-size: 1rem;
        }

        .balance-value.positive {
            color: #00ff88;
        }

        .balance-value.negative {
            color: #ff3366;
        }

        /* Risk Progress Bars */
        .risk-progress-container {
            margin: 15px 0;
        }

        .risk-progress {
            margin-bottom: 15px;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.85rem;
        }

        .progress-label {
            color: #8b92b8;
        }

        .progress-value {
            font-weight: 600;
        }

        .progress-bar {
            height: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 5px;
            transition: width 0.3s ease;
        }

        .progress-fill.safe {
            background: linear-gradient(90deg, #00ff88, #00d4ff);
        }

        .progress-fill.warning {
            background: linear-gradient(90deg, #ffa500, #ffd700);
        }

        .progress-fill.danger {
            background: linear-gradient(90deg, #ff3366, #ff0000);
        }

        .progress-status {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.8rem;
            margin-top: 5px;
        }

        .reset-timer {
            font-size: 0.75rem;
            color: #8b92b8;
            text-align: center;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Stats Grid */
        .stats-mini-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 20px 0;
        }

        .stat-mini-card {
            background: rgba(13, 16, 37, 0.6);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-mini-label {
            font-size: 0.7rem;
            color: #8b92b8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .stat-mini-value {
            font-size: 1.2rem;
            font-weight: 700;
            color: #00d4ff;
        }

        /* Quick Actions */
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 30px;
        }

        .quick-action-btn {
            background: linear-gradient(45deg, #7b2ff7, #00d4ff);
            border: none;
            color: white;
            padding: 15px 20px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
        }

        .quick-action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(123, 47, 247, 0.6);
        }

        .quick-action-btn.secondary {
            background: rgba(13, 16, 37, 0.8);
            border: 1px solid rgba(123, 47, 247, 0.5);
            color: #7b2ff7;
        }

        /* ===== RISK MANAGEMENT PAGE ===== */
        .risk-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 15px;
            overflow-x: auto;
        }

        .risk-tab {
            padding: 10px 20px;
            border-radius: 10px;
            background: rgba(13, 16, 37, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #8b92b8;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .risk-tab:hover {
            background: rgba(13, 16, 37, 0.8);
        }

        .risk-tab.active {
            background: rgba(123, 47, 247, 0.2);
            border-color: #7b2ff7;
            color: #7b2ff7;
        }

        .risk-tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .risk-tab-content.active {
            display: block;
        }

        /* Loss Trade List */
        .loss-trade-list {
            margin: 20px 0;
        }

        .loss-trade-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: rgba(13, 16, 37, 0.6);
            border-radius: 10px;
            margin-bottom: 10px;
            border: 1px solid rgba(255, 51, 102, 0.2);
        }

        .loss-trade-pair {
            font-weight: 600;
            color: #00d4ff;
        }

        .loss-trade-amount {
            color: #ff3366;
            font-weight: 600;
        }

        .loss-trade-date {
            font-size: 0.8rem;
            color: #8b92b8;
        }

        /* Warning Box */
        .warning-box {
            background: rgba(255, 165, 0, 0.1);
            border: 2px solid #ffa500;
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .warning-icon {
            font-size: 2rem;
        }

        .warning-text {
            color: #ffa500;
            font-weight: 600;
            flex: 1;
        }

        .critical-box {
            background: rgba(255, 51, 102, 0.1);
            border: 2px solid #ff3366;
        }

        .critical-box .warning-text {
            color: #ff3366;
        }

        /* Settings Grid */
        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin: 25px 0;
        }

        .setting-item {
            background: rgba(13, 16, 37, 0.6);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .setting-label {
            display: block;
            color: #8b92b8;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }

        .setting-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #00ff88;
            margin-bottom: 15px;
        }

        .setting-note {
            font-size: 0.8rem;
            color: #8b92b8;
            font-style: italic;
            padding: 10px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 6px;
            margin-top: 15px;
        }

        .locked-setting {
            opacity: 0.7;
            cursor: not-allowed;
        }

        /* ===== EXISTING CALCULATOR STYLES ===== */
        .scroll-container {
            height: 100%;
            overflow-y: auto;
            padding: 0;
        }

        .container {
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
        }

        .calculator-view .header {
            display: none;
        }

        /* Current Balance Display */
        .current-balance-display {
            background: linear-gradient(135deg, rgba(123, 47, 247, 0.15), rgba(0, 212, 255, 0.15));
            border: 2px solid rgba(123, 47, 247, 0.4);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
            animation: pulseBalance 3s infinite;
        }

        @keyframes pulseBalance {
            0%, 100% { box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2), 0 0 20px rgba(123, 47, 247, 0.2); }
            50% { box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3), 0 0 30px rgba(123, 47, 247, 0.4); }
        }

        /* Calculator Card */
        .calculator-card {
            background: rgba(26, 29, 62, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3),
                        0 0 0 1px rgba(255, 255, 255, 0.05);
            animation: fadeInUp 0.6s ease;
            margin-bottom: 30px;
        }

        /* Form Grid */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        /* Form Group */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 0.9rem;
            color: #8b92b8;
            font-weight: 500;
        }

        .form-group input,
        .form-group select {
            padding: 12px 15px;
            background: rgba(13, 16, 37, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #e0e0e0;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #7b2ff7;
            box-shadow: 0 0 0 2px rgba(123, 47, 247, 0.2);
        }

        /* Results Grid */
        .results-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 15px;
        }

        /* History Styles */
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .history-item {
            background: rgba(13, 16, 37, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
            position: relative;
        }

        /* Modal Styles */
        .status-modal, .balance-modal, .edit-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1001;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
            padding: 20px;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(0, 255, 136, 0.9);
            color: #0a0e27;
            padding: 15px 25px;
            border-radius: 10px;
            font-weight: 600;
            box-shadow: 0 4px 20px rgba(0, 255, 136, 0.4);
            z-index: 1000;
            animation: slideIn 0.3s ease;
            display: none;
        }

        /* View Toggle Button */
        .view-toggle {
            display: none;
        }

        /* ===== FIXED UI ELEMENTS ===== */
        .btn-edit-balance {
            background: rgba(123, 47, 247, 0.2);
            border: 1px solid #7b2ff7;
            color: #7b2ff7;
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 15px;
        }

        .btn-edit-balance:hover {
            background: rgba(123, 47, 247, 0.3);
        }

        /* Toggle Container */
        .toggle-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .toggle-switch {
            width: 50px;
            height: 25px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            position: relative;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .toggle-slider {
            width: 21px;
            height: 21px;
            background: #7b2ff7;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 2px;
            transition: all 0.3s ease;
        }

        .toggle-switch.active .toggle-slider {
            transform: translateX(25px);
            background: #00d4ff;
        }

        .toggle-label {
            color: #8b92b8;
            font-size: 0.9rem;
        }

        /* ===== MOBILE RESPONSIVE ===== */
        @media (max-width: 1024px) {
            .sidebar {
                transform: translateX(-100%);
            }
            
            .sidebar.show {
                transform: translateX(0);
            }
            
            .main-content {
                margin-left: 0;
                max-width: 100%;
                padding-bottom: 70px;
            }
            
            .bottom-nav {
                display: block;
            }
            
            .cards-grid {
                grid-template-columns: 1fr;
            }
            
            .results-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .main-content {
                padding: 15px;
            }
            
            .quick-actions {
                grid-template-columns: 1fr;
            }
            
            .risk-tabs {
                flex-wrap: wrap;
            }
            
            .form-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 480px) {
            .page-header h1 {
                font-size: 1.5rem;
            }
            
            .balance-display {
                font-size: 2rem;
            }
            
            .stats-mini-grid {
                grid-template-columns: 1fr;
            }
            
            .calculator-card {
                padding: 20px;
            }
        }

        /* ===== ANIMATIONS ===== */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideIn {
            from { transform: translateX(-20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes fadeInUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* ===== MENU TOGGLE BUTTON ===== */
        .menu-toggle {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1100;
            background: linear-gradient(45deg, #7b2ff7, #00d4ff);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(123, 47, 247, 0.6);
            transition: all 0.3s ease;
        }

        @media (max-width: 1024px) {
            .menu-toggle {
                display: flex;
            }
        }

        /* ===== RISK WARNING MODAL ===== */
        .risk-warning-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .risk-warning-modal.show {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        .risk-warning-content {
            background: rgba(26, 29, 62, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            border: 2px solid #ffa500;
            animation: slideIn 0.3s ease;
        }

        .risk-warning-content.critical {
            border-color: #ff3366;
        }

        .risk-warning-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            color: #ffa500;
        }

        .risk-warning-header.critical {
            color: #ff3366;
        }

        .risk-warning-icon {
            font-size: 2rem;
        }

        .risk-warning-title {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .risk-warning-body {
            line-height: 1.6;
            margin-bottom: 25px;
            color: #e0e0e0;
        }

        .risk-warning-stats {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
        }

        .risk-warning-stat {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .risk-warning-stat:last-child {
            border-bottom: none;
        }

        .risk-warning-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 25px;
        }

        .risk-warning-btn {
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .risk-warning-btn.cancel {
            background: rgba(255, 255, 255, 0.1);
            color: #e0e0e0;
        }

        .risk-warning-btn.proceed {
            background: linear-gradient(45deg, #ffa500, #ff3366);
            color: white;
        }

        /* ===== ADDITIONAL FIXES ===== */
        #todayDate, #weekRange {

    <script>
        // ===== GLOBAL VARIABLES =====
        let currentPage = 'overview';
        let currentRiskTab = 'today';
        let riskWarnings = [];
        let pendingCalculation = null;

        // ===== PAGE NAVIGATION =====
        function navigateTo(page) {
            // Hide all pages
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            
            // Show target page
            document.getElementById(`${page}-page`).classList.add('active');
            
            // Update navigation active states
            document.querySelectorAll('.nav-item, .bottom-nav-item').forEach(item => {
                item.classList.remove('active');
                if (item.dataset.page === page) {
                    item.classList.add('active');
                }
            });
            
            // Update current page
            currentPage = page;
            
            // Update page-specific data
            if (page === 'overview') {
                updateOverviewData();
            } else if (page === 'risk') {
                updateRiskData();
                switchRiskTab(currentRiskTab);
            } else if (page === 'history') {
                loadHistory();
                updateStats();
            }
            
            // Close sidebar on mobile
            if (window.innerWidth <= 1024) {
                document.getElementById('sidebar').classList.remove('show');
            }
            
            // Scroll to top
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function switchRiskTab(tab) {
            currentRiskTab = tab;
            
            // Update tab buttons
            document.querySelectorAll('.risk-tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.risk-tab[data-tab="${tab}"]`).classList.add('active');
            
            // Update tab content
            document.querySelectorAll('.risk-tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(`${tab}-tab`).classList.add('active');
            
            // Update tab-specific data
            updateRiskTabData(tab);
        }

        // ===== RISK MANAGEMENT FUNCTIONS =====
        function getTodayDate() {
            const now = new Date();
            const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            return now.toLocaleDateString('id-ID', options);
        }

        function getWeekRange() {
            const now = new Date();
            const startOfWeek = new Date(now);
            startOfWeek.setDate(now.getDate() - now.getDay() + (now.getDay() === 0 ? -6 : 1));
            
            const endOfWeek = new Date(startOfWeek);
            endOfWeek.setDate(startOfWeek.getDate() + 6);
            
            const options = { day: 'numeric', month: 'short' };
            return `${startOfWeek.toLocaleDateString('id-ID', options)} - ${endOfWeek.toLocaleDateString('id-ID', options)}`;
        }

        function calculateTodayLoss() {
            const history = JSON.parse(localStorage.getItem('tpslHistory') || '[]');
            const today = new Date().toDateString();
            
            const todayTrades = history.filter(trade => {
                const tradeDate = new Date(trade.timestamp).toDateString();
                return tradeDate === today && trade.status === 'hit-sl' && !trade.slInProfit;
            });
            
            const totalLoss = todayTrades.reduce((sum, trade) => sum + trade.loss, 0);
            return totalLoss;
        }

        function calculateWeeklyLoss() {
            const history = JSON.parse(localStorage.getItem('tpslHistory') || '[]');
            const now = new Date();
            const startOfWeek = new Date(now);
            startOfWeek.setDate(now.getDate() - now.getDay() + (now.getDay() === 0 ? -6 : 1));
            startOfWeek.setHours(0, 0, 0, 0);
            
            const weeklyTrades = history.filter(trade => {
                const tradeDate = new Date(trade.timestamp);
                return tradeDate >= startOfWeek && trade.status === 'hit-sl' && !trade.slInProfit;
            });
            
            const totalLoss = weeklyTrades.reduce((sum, trade) => sum + trade.loss, 0);
            return totalLoss;
        }

        function calculateDrawdown() {
            const peakBalance = parseFloat(localStorage.getItem('peakBalance') || localStorage.getItem('initialBalance') || '0');
            const currentBalance = calculateCurrentBalance();
            
            if (peakBalance === 0) return 0;
            
            const drawdown = ((currentBalance - peakBalance) / peakBalance) * 100;
            
            // Update peak if current balance is higher
            if (currentBalance > peakBalance) {
                localStorage.setItem('peakBalance', currentBalance.toString());
            }
            
            return Math.abs(drawdown);
        }

        function getRiskLimits() {
            const initialBalance = parseFloat(localStorage.getItem('initialBalance') || '0');
            
            return {
                dailyLimit: initialBalance * 0.02,
                weeklyLimit: initialBalance * 0.05,
                drawdownLimit: 8
            };
        }

        function validateRiskLimits() {
            const initialBalance = parseFloat(localStorage.getItem('initialBalance') || '0');
            if (initialBalance === 0) return [];
            
            const todayLoss = calculateTodayLoss();
            const weeklyLoss = calculateWeeklyLoss();
            const drawdown = calculateDrawdown();
            
            const limits = getRiskLimits();
            
            const warnings = [];
            
            // Daily limit check
            if (todayLoss >= limits.dailyLimit) {
                warnings.push({
                    level: 'critical',
                    title: '🚫 LIMIT HARIAN TERCAPAI',
                    message: 'Anda sudah mencapai batas kerugian harian (2%). Disarankan STOP trading hari ini.',
                    details: `Loss hari ini: ${formatRupiah(todayLoss)} / Limit: ${formatRupiah(limits.dailyLimit)}`
                });
            } else if (todayLoss >= limits.dailyLimit * 0.8) {
                warnings.push({
                    level: 'warning',
                    title: '⚠️ MENDEKATI LIMIT HARIAN',
                    message: 'Anda sudah menggunakan 80% limit harian. Berhati-hatilah!',
                    details: `Loss hari ini: ${formatRupiah(todayLoss)} / Limit: ${formatRupiah(limits.dailyLimit)} (${((todayLoss/limits.dailyLimit)*100).toFixed(1)}%)`
                });
            }
            
            // Weekly limit check
            if (weeklyLoss >= limits.weeklyLimit) {
                warnings.push({
                    level: 'critical',
                    title: '🚫 LIMIT MINGGUAN TERCAPAI',
                    message: 'Anda sudah mencapai batas kerugian mingguan (5%). STOP trading hingga minggu depan.',
                    details: `Loss minggu ini: ${formatRupiah(weeklyLoss)} / Limit: ${formatRupiah(limits.weeklyLimit)}`
                });
            }
            
            // Drawdown check
            if (drawdown >= limits.drawdownLimit) {
                warnings.push({
                    level: 'critical',
                    title: '⛔ DRAWDOWN KRITIS',
                    message: 'SEMUA AKTIVITAS TRADING DIHENTIKAN. Evaluasi penuh diperlukan.',
                    details: `Drawdown: ${drawdown.toFixed(2)}% / Limit: ${limits.drawdownLimit}%`
                });
            }
            
            return warnings;
        }

        function showRiskWarning(warnings) {
            const modal = document.getElementById('riskWarningModal');
            const content = document.getElementById('riskWarningContent');
            const header = document.getElementById('riskWarningHeader');
            const icon = document.getElementById('riskWarningIcon');
            const title = document.getElementById('riskWarningTitle');
            const body = document.getElementById('riskWarningBody');
            const stats = document.getElementById('riskWarningStats');
            
            // Get the highest level warning
            const criticalWarnings = warnings.filter(w => w.level === 'critical');
            const warningToShow = criticalWarnings.length > 0 ? criticalWarnings[0] : warnings[0];
            
            if (!warningToShow) return false;
            
            // Set modal styling based on level
            if (warningToShow.level === 'critical') {
                content.classList.add('critical');
                header.classList.add('critical');
                icon.textContent = '🚫';
            } else {
                content.classList.remove('critical');
                header.classList.remove('critical');
                icon.textContent = '⚠️';
            }
            
            // Set content
            title.textContent = warningToShow.title;
            body.innerHTML = `<p style="margin-bottom: 15px;">${warningToShow.message}</p>`;
            
            // Set stats
            stats.innerHTML = `
                <div class="risk-warning-stat">
                    <span>Loss Hari Ini:</span>
                    <span>${formatRupiah(calculateTodayLoss())}</span>
                </div>
                <div class="risk-warning-stat">
                    <span>Limit Harian:</span>
                    <span>${formatRupiah(getRiskLimits().dailyLimit)}</span>
                </div>
                <div class="risk-warning-stat">
                    <span>Loss Minggu Ini:</span>
                    <span>${formatRupiah(calculateWeeklyLoss())}</span>
                </div>
                <div class="risk-warning-stat">
                    <span>Limit Mingguan:</span>
                    <span>${formatRupiah(getRiskLimits().weeklyLimit)}</span>
                </div>
            `;
            
            // Show modal
            modal.classList.add('show');
            
            // Return true to indicate warnings exist
            return true;
        }

        // ===== DATA UPDATE FUNCTIONS =====
        function updateOverviewData() {
            const initialBalance = parseFloat(localStorage.getItem('initialBalance') || '0');
            const currentBalance = calculateCurrentBalance();
            const todayLoss = calculateTodayLoss();
            const weeklyLoss = calculateWeeklyLoss();
            const drawdown = calculateDrawdown();
            const limits = getRiskLimits();
            const history = JSON.parse(localStorage.getItem('tpslHistory') || '[]');
            
            // Update balance display
            document.getElementById('overviewBalance').textContent = formatRupiah(currentBalance);
            document.getElementById('initialBalanceOverview').textContent = formatRupiah(initialBalance);
            document.getElementById('currentBalanceOverview').textContent = formatRupiah(currentBalance);
            
            const netProfit = calculateNetProfitLoss();
            const netProfitPercent = initialBalance > 0 ? (netProfit / initialBalance * 100) : 0;
            document.getElementById('netProfitOverview').innerHTML = `
                ${formatRupiah(netProfit)} <span style="color: ${netProfit >= 0 ? '#00ff88' : '#ff3366'}; font-size: 0.9em;">
                    (${netProfit >= 0 ? '+' : ''}${netProfitPercent.toFixed(1)}%)
                </span>
            `;
            
            const roi = calculateROI();
            document.getElementById('roiOverview').innerHTML = `
                <span style="color: ${roi >= 0 ? '#00ff88' : '#ff3366'}">
                    ${roi >= 0 ? '+' : ''}${roi.toFixed(2)}%
                </span>
            `;
            
            // Update risk progress bars
            const dailyPercent = limits.dailyLimit > 0 ? Math.min(100, (todayLoss / limits.dailyLimit) * 100) : 0;
            const weeklyPercent = limits.weeklyLimit > 0 ? Math.min(100, (weeklyLoss / limits.weeklyLimit) * 100) : 0;
            const drawdownPercent = Math.min(100, (drawdown / limits.drawdownLimit) * 100);
            
            document.getElementById('dailyLossText').textContent = `${formatRupiah(todayLoss)} / ${formatRupiah(limits.dailyLimit)}`;
            document.getElementById('dailyLossBar').style.width = `${dailyPercent}%`;
            document.getElementById('dailyLossBar').className = `progress-fill ${dailyPercent < 60 ? 'safe' : dailyPercent < 80 ? 'warning' : 'danger'}`;
            document.getElementById('dailyLossStatus').innerHTML = `
                <span>${dailyPercent.toFixed(1)}% terpakai</span>
                ${dailyPercent >= 80 ? '<span style="color: #ff3366;">⚠️</span>' : dailyPercent >= 60 ? '<span style="color: #ffa500;">⚠️</span>' : '<span style="color: #00ff88;">✅</span>'}
            `;
            
            document.getElementById('weeklyLossText').textContent = `${formatRupiah(weeklyLoss)} / ${formatRupiah(limits.weeklyLimit)}`;
            document.getElementById('weeklyLossBar').style.width = `${weeklyPercent}%`;
            document.getElementById('weeklyLossBar').className = `progress-fill ${weeklyPercent < 60 ? 'safe' : weeklyPercent < 80 ? 'warning' : 'danger'}`;
            document.getElementById('weeklyLossStatus').innerHTML = `
                <span>${weeklyPercent.toFixed(1)}% terpakai</span>
                ${weeklyPercent >= 80 ? '<span style="color: #ff3366;">⚠️</span>' : weeklyPercent >= 60 ? '<span style="color: #ffa500;">⚠️</span>' : '<span style="color: #00ff88;">✅</span>'}
            `;
            
            document.getElementById('drawdownText').textContent = `${drawdown.toFixed(2)}% / ${limits.drawdownLimit}%`;
            document.getElementById('drawdownBar').style.width = `${drawdownPercent}%`;
            document.getElementById('drawdownBar').className = `progress-fill ${drawdownPercent < 60 ? 'safe' : drawdownPercent < 80 ? 'warning' : 'danger'}`;
            document.getElementById('drawdownStatus').innerHTML = `
                <span>${drawdownPercent < 60 ? 'Aman ✅' : drawdownPercent < 80 ? 'Waspada ⚠️' : 'Kritis 🚫'}</span>
            `;
            
            // Update reset timer
            const now = new Date();
            const tomorrow = new Date(now);
            tomorrow.setDate(tomorrow.getDate() + 1);
            tomorrow.setHours(0, 0, 0, 0);
            
            const timeUntilReset = tomorrow - now;
            const hours = Math.floor(timeUntilReset / (1000 * 60 * 60));
            const minutes = Math.floor((timeUntilReset % (1000 * 60 * 60)) / (1000 * 60));
            
            document.getElementById('resetTimer').textContent = `Reset otomatis: ${hours} jam ${minutes} menit lagi`;
            
            // Update statistics
            const closedTrades = history.filter(t => t.status && t.status !== 'running');
            const wonTrades = closedTrades.filter(t => t.status === 'hit-tp' || t.status === 'partial');
            const winRate = closedTrades.length > 0 ? ((wonTrades.length / closedTrades.length) * 100).toFixed(1) : 0;
            
            let totalProfit = 0;
            let totalLoss = 0;
            
            closedTrades.forEach(trade => {
                if (trade.status === 'hit-tp') {
                    totalProfit += trade.profit;
                } else if (trade.status === 'hit-sl') {
                    if (trade.slInProfit) {
                        totalProfit += trade.loss;
                    } else {
                        totalLoss += trade.loss;
                    }
                } else if (trade.status === 'partial') {
                    if (trade.usePartialTP && trade.tpLevels) {
                        const hitTPs = trade.tpLevels.filter(tp => tp.status === 'hit');
                        totalProfit += hitTPs.reduce((sum, tp) => sum + tp.profit, 0);
                    }
                }
            });
            
            // Trades today
            const today = new Date().toDateString();
            const tradesToday = history.filter(trade => {
                const tradeDate = new Date(trade.timestamp).toDateString();
                return tradeDate === today;
            });
            
            // Trades this week
            const startOfWeek = new Date(now);
            startOfWeek.setDate(now.getDate() - now.getDay() + (now.getDay() === 0 ? -6 : 1));
            startOfWeek.setHours(0, 0, 0, 0);
            
            const tradesThisWeek = history.filter(trade => {
                const tradeDate = new Date(trade.timestamp);
                return tradeDate >= startOfWeek;
            });
            
            document.getElementById('totalTradesOverview').textContent = history.length;
            document.getElementById('winRateOverview').textContent = `${winRate}%`;
            document.getElementById('totalProfitOverview').textContent = formatRupiah(totalProfit);
            document.getElementById('totalLossOverview').textContent = formatRupiah(totalLoss);
            document.getElementById('tradesToday').textContent = tradesToday.length;
            document.getElementById('tradesThisWeek').textContent = tradesThisWeek.length;
        }

        function updateRiskData() {
            updateRiskTabData(currentRiskTab);
        }

        function updateRiskTabData(tab) {
            const initialBalance = parseFloat(localStorage.getItem('initialBalance') || '0');
            const currentBalance = calculateCurrentBalance();
            const peakBalance = parseFloat(localStorage.getItem('peakBalance') || initialBalance);
            const limits = getRiskLimits();
            
            if (tab === 'today') {
                // Update today's date
                document.getElementById('todayDate').textContent = getTodayDate();
                
                // Update daily limit values
                document.getElementById('dailyLimitValue').textContent = '2%';
                document.getElementById('dailyMaxLoss').textContent = formatRupiah(limits.dailyLimit);
                
                // Update today's loss list
                const todayLoss = calculateTodayLoss();
                const history = JSON.parse(localStorage.getItem('tpslHistory') || '[]');
                const today = new Date().toDateString();
                
                const todayLossTrades = history.filter(trade => {
                    const tradeDate = new Date(trade.timestamp).toDateString();
                    return tradeDate === today && trade.status === 'hit-sl' && !trade.slInProfit;
                });
                
                const lossList = document.getElementById('todayLossList');
                
                if (todayLossTrades.length === 0) {
                    lossList.innerHTML = '<p style="text-align: center; color: #8b92b8; padding: 20px 0;">Tidak ada loss hari ini</p>';
                } else {
                    lossList.innerHTML = todayLossTrades.map((trade, index) => `
                        <div class="loss-trade-item">
                            <div>
                                <div class="loss-trade-pair">${trade.pair.toUpperCase()}</div>
                                <div class="loss-trade-date">${new Date(trade.timestamp).toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' })}</div>
                            </div>
                            <div class="loss-trade-amount">-${formatRupiah(trade.loss)}</div>
                        </div>
                    `).join('');
                }
                
                // Update total loss today
                const dailyPercent = limits.dailyLimit > 0 ? Math.min(100, (todayLoss / limits.dailyLimit) * 100) : 0;
                document.getElementById('todayLossTotal').textContent = `${formatRupiah(todayLoss)} / ${formatRupiah(limits.dailyLimit)}`;
                document.getElementById('todayLossBar').style.width = `${dailyPercent}%`;
                document.getElementById('todayLossBar').className = `progress-fill ${dailyPercent < 60 ? 'safe' : dailyPercent < 80 ? 'warning' : 'danger'}`;
                
                let statusText = `${dailyPercent.toFixed(1)}% terpakai`;
                if (dailyPercent >= 100) statusText = 'LIMIT TERCAPAI 🚫';
                else if (dailyPercent >= 80) statusText = 'MENDEKATI LIMIT ⚠️';
                
                document.getElementById('todayLossStatus').innerHTML = `<span>${statusText}</span>`;
                
                // Update warning box
                const warningBox = document.getElementById('dailyWarningBox');
                if (dailyPercent >= 100) {
                    warningBox.innerHTML = `
                        <div class="warning-box critical-box" style="margin-top: 20px;">
                            <span class="warning-icon">🚫</span>
                            <div class="warning-text">
                                <strong>LIMIT HARIAN TERCAPAI!</strong><br>
                                Anda sudah mencapai batas kerugian harian (2%).<br>
                                <em>Disarankan untuk berhenti trading hari ini.</em>
                            </div>
                        </div>
                    `;
                    warningBox.style.display = 'block';
                } else if (dailyPercent >= 80) {
                    warningBox.innerHTML = `
                        <div class="warning-box" style="margin-top: 20px;">
                            <span class="warning-icon">⚠️</span>
                            <div class="warning-text">
                                <strong>PERINGATAN: Mendekati Limit Harian</strong><br>
                                Anda sudah menggunakan ${dailyPercent.toFixed(1)}% dari limit harian.<br>
                                <em>Berhati-hatilah dalam trading selanjutnya.</em>
                            </div>
                        </div>
                    `;
                    warningBox.style.display = 'block';
                } else {
                    warningBox.style.display = 'none';
                }
                
            } else if (tab === 'weekly') {
                // Update week range
                document.getElementById('weekRange').textContent = `Minggu: ${getWeekRange()}`;
                
                // Update weekly limit values
                document.getElementById('weeklyLimitValue').textContent = '5%';
                document.getElementById('weeklyMaxLoss').textContent = formatRupiah(limits.weeklyLimit);
                
                // Update weekly loss list
                const weeklyLoss = calculateWeeklyLoss();
                const history = JSON.parse(localStorage.getItem('tpslHistory') || '[]');
                const now = new Date();
                const startOfWeek = new Date(now);
                startOfWeek.setDate(now.getDate() - now.getDay() + (now.getDay() === 0 ? -6 : 1));
                startOfWeek.setHours(0, 0, 0, 0);
                
                const weeklyLossTrades = history.filter(trade => {
                    const tradeDate = new Date(trade.timestamp);
                    return tradeDate >= startOfWeek && trade.status === 'hit-sl' && !trade.slInProfit;
                });
                
                const lossList = document.getElementById('weeklyLossList');
                
                if (weeklyLossTrades.length === 0) {
                    lossList.innerHTML = '<p style="text-align: center; color: #8b92b8; padding: 20px 0;">Tidak ada loss minggu ini</p>';
                } else {
                    lossList.innerHTML = weeklyLossTrades.map((trade, index) => `
                        <div class="loss-trade-item">
                            <div>
                                <div class="loss-trade-pair">${trade.pair.toUpperCase()}</div>
                                <div class="loss-trade-date">${new Date(trade.timestamp).toLocaleDateString('id-ID', { day: 'numeric', month: 'short' })}</div>
                            </div>
                            <div class="loss-trade-amount">-${formatRupiah(trade.loss)}</div>
                        </div>
                    `).join('');
                }
                
                // Update total loss weekly
                const weeklyPercent = limits.weeklyLimit > 0 ? Math.min(100, (weeklyLoss / limits.weeklyLimit) * 100) : 0;
                document.getElementById('weeklyLossTotal').textContent = `${formatRupiah(weeklyLoss)} / ${formatRupiah(limits.weeklyLimit)}`;
                document.getElementById('weeklyLossBar').style.width = `${weeklyPercent}%`;
                document.getElementById('weeklyLossBar').className = `progress-fill ${weeklyPercent < 60 ? 'safe' : weeklyPercent < 80 ? 'warning' : 'danger'}`;
                
                let statusText = `${weeklyPercent.toFixed(1)}% terpakai`;
                if (weeklyPercent >= 100) statusText = 'LIMIT TERCAPAI 🚫';
                else if (weeklyPercent >= 80) statusText = 'MENDEKATI LIMIT ⚠️';
                
                document.getElementById('weeklyLossStatus').innerHTML = `<span>${statusText}</span>`;
                
                // Update warning box
                const warningBox = document.getElementById('weeklyWarningBox');
                if (weeklyPercent >= 100) {
                    warningBox.innerHTML = `
                        <div class="warning-box critical-box" style="margin-top: 20px;">
                            <span class="warning-icon">🚫</span>
                            <div class="warning-text">
                                <strong>LIMIT MINGGUAN TERCAPAI!</strong><br>
                                Anda sudah mencapai batas kerugian mingguan (5%).<br>
                                <em>STOP trading hingga minggu depan.</em>
                            </div>
                        </div>
                    `;
                    warningBox.style.display = 'block';
                } else if (weeklyPercent >= 80) {
                    warningBox.innerHTML = `
                        <div class="warning-box" style="margin-top: 20px;">
                            <span class="warning-icon">⚠️</span>
                            <div class="warning-text">
                                <strong>PERINGATAN: Mendekati Limit Mingguan</strong><br>
                                Anda sudah menggunakan ${weeklyPercent.toFixed(1)}% dari limit mingguan.<br>
                                <em>Pertimbangkan untuk mengurangi risiko.</em>
                            </div>
                        </div>
                    `;
                    warningBox.style.display = 'block';
                } else {
                    warningBox.style.display = 'none';
                }
                
                // Update reset time
                const daysUntilMonday = now.getDay() === 0 ? 1 : (8 - now.getDay()) % 7;
                document.getElementById('weeklyResetTime').textContent = 
                    daysUntilMonday === 0 ? 'Hari ini 00:00 WIB' : `${daysUntilMonday} hari lagi`;
                    
            } else if (tab === 'drawdown') {
                // Update drawdown values
                const drawdown = calculateDrawdown();
                
                document.getElementById('peakBalanceValue').textContent = formatRupiah(peakBalance);
                document.getElementById('currentBalanceRisk').textContent = formatRupiah(currentBalance);
                document.getElementById('drawdownValue').textContent = `${drawdown.toFixed(2)}%`;
                
                // Update drawdown progress
                const drawdownPercent = Math.min(100, (drawdown / limits.drawdownLimit) * 100);
                document.getElementById('drawdownVsLimit').textContent = `${drawdown.toFixed(2)}% / ${limits.drawdownLimit}%`;
                document.getElementById('drawdownProgressBar').style.width = `${drawdownPercent}%`;
                document.getElementById('drawdownProgressBar').className = `progress-fill ${drawdownPercent < 60 ? 'safe' : drawdownPercent < 80 ? 'warning' : 'danger'}`;
                
                let statusText = 'Aman ✅';
                if (drawdownPercent >= 100) statusText = 'KRITIS 🚫';
                else if (drawdownPercent >= 80) statusText = 'WASPADA ⚠️';
                
                document.getElementById('drawdownRiskStatus').innerHTML = `<span>${statusText}</span>`;
                
                // Update status box
                const statusBox = document.getElementById('drawdownStatusBox');
                if (drawdownPercent >= 100) {
                    statusBox.innerHTML = `
                        <span class="warning-icon">🚫</span>
                        <div class="warning-text">
                            <strong>STATUS: KRITIS</strong><br>
                            Drawdown mencapai ${drawdown.toFixed(2)}%!<br>
                            <em>SEMUA TRADING DIHENTIKAN. Evaluasi wajib dilakukan.</em>
                        </div>
                    `;
                    statusBox.classList.add('critical-box');
                } else if (drawdownPercent >= 80) {
                    statusBox.innerHTML = `
                        <span class="warning-icon">⚠️</span>
                        <div class="warning-text">
                            <strong>STATUS: WASPADA</strong><br>
                            Drawdown mencapai ${drawdown.toFixed(2)}%.<br>
                            <em>Mendekati batas kritis. Hati-hati!</em>
                        </div>
                    `;
                    statusBox.classList.remove('critical-box');
                } else {
                    statusBox.innerHTML = `
                        <span class="warning-icon">✅</span>
                        <div class="warning-text">
                            <strong>STATUS: AMAN</strong><br>
                            Drawdown saat ini dalam batas wajar.<br>
                            <em>Lanjutkan trading dengan disiplin.</em>
                        </div>
                    `;
                    statusBox.classList.remove('critical-box');
                }
            }
        }

        function resetAllCounters() {
            if (confirm('Reset semua counter risiko? Ini akan menghapus semua data loss harian dan mingguan.')) {
                // Clear today's loss trades flag
                localStorage.setItem('lastResetDate', new Date().toDateString());
                localStorage.setItem('lastWeeklyReset', getWeekNumber(new Date()).toString());
                
                showToast('Counter risiko telah direset!');
                updateOverviewData();
                updateRiskData();
            }
        }

        function resetPeakBalance() {
            const currentBalance = calculateCurrentBalance();
            localStorage.setItem('peakBalance', currentBalance.toString());
            showToast('Peak balance direset ke saldo saat ini!');
            updateOverviewData();
            updateRiskData();
        }

        // ===== UTILITY FUNCTIONS =====
        function formatRupiah(amount) {
            return new Intl.NumberFormat('id-ID', {
                style: 'currency',
                currency: 'IDR',
                minimumFractionDigits: 0
            }).format(amount);
        }

        function calculateCurrentBalance() {
            const initialBalance = parseFloat(localStorage.getItem('initialBalance') || '0');
            const history = JSON.parse(localStorage.getItem('tpslHistory') || '[]');
            
            const closedTrades = history.filter(t => 
                t.status === 'hit-tp' || 
                t.status === 'hit-sl' || 
                t.status === 'break-even' ||
                t.status === 'partial'
            );
            
            let totalProfit = 0;
            let totalLoss = 0;
            
            closedTrades.forEach(trade => {
                if (trade.status === 'hit-tp') {
                    totalProfit += trade.profit;
                } else if (trade.status === 'hit-sl') {
                    if (trade.slInProfit) {
                        totalProfit += trade.loss;
                    } else {
                        totalLoss += trade.loss;
                    }
                } else if (trade.status === 'partial') {
                    if (trade.usePartialTP && trade.tpLevels) {
                        const hitTPs = trade.tpLevels.filter(tp => tp.status === 'hit');
                        totalProfit += hitTPs.reduce((sum, tp) => sum + tp.profit, 0);
                    }
                }
            });
            
            return initialBalance + totalProfit - totalLoss;
        }

        function calculateNetProfitLoss() {
            const history = JSON.parse(localStorage.getItem('tpslHistory') || '[]');
            
            const closedTrades = history.filter(t => 
                t.status === 'hit-tp' || 
                t.status === 'hit-sl' ||
                t.status === 'partial'
            );
            
            let totalProfit = 0;
            let totalLoss = 0;
            
            closedTrades.forEach(trade => {
                if (trade.status === 'hit-tp') {
                    totalProfit += trade.profit;
                } else if (trade.status === 'hit-sl') {
                    if (trade.slInProfit) {
                        totalProfit += trade.loss;
                    } else {
                        totalLoss += trade.loss;
                    }
                } else if (trade.status === 'partial') {
                    if (trade.usePartialTP && trade.tpLevels) {
                        const hitTPs = trade.tpLevels.filter(tp => tp.status === 'hit');
                        totalProfit += hitTPs.reduce((sum, tp) => sum + tp.profit, 0);
                    }
                }
            });
            
            return totalProfit - totalLoss;
        }

        function calculateROI() {
            const initialBalance = parseFloat(localStorage.getItem('initialBalance') || '0');
            const netProfitLoss = calculateNetProfitLoss();
            
            if (initialBalance === 0) return 0;
            
            const roi = (netProfitLoss / initialBalance) * 100;
            return roi;
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.display = 'block';

            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }

        function getWeekNumber(date) {
            const firstDayOfYear = new Date(date.getFullYear(), 0, 1);
            const pastDaysOfYear = (date - firstDayOfYear) / 86400000;
            return Math.ceil((pastDaysOfYear + firstDayOfYear.getDay() + 1) / 7);
        }

        // ===== EVENT LISTENERS =====
        document.addEventListener('DOMContentLoaded', function() {
            // Navigation event listeners
            document.querySelectorAll('.nav-item, .bottom-nav-item').forEach(item => {
                item.addEventListener('click', function(e) {
                    e.preventDefault();
                    navigateTo(this.dataset.page);
                });
            });
            
            // Risk tab listeners
            document.querySelectorAll('.risk-tab').forEach(tab => {
                tab.addEventListener('click', function() {
                    switchRiskTab(this.dataset.tab);
                });
            });
            
            // Menu toggle
            document.getElementById('menuToggle').addEventListener('click', function() {
                document.getElementById('sidebar').classList.toggle('show');
            });
            
            // Close sidebar when clicking outside on mobile
            document.addEventListener('click', function(e) {
                if (window.innerWidth <= 1024) {
                    const sidebar = document.getElementById('sidebar');
                    const menuToggle = document.getElementById('menuToggle');
                    
                    if (!sidebar.contains(e.target) && !menuToggle.contains(e.target) && sidebar.classList.contains('show')) {
                        sidebar.classList.remove('show');
                    }
                }
            });
            
            // Quick action buttons
            document.getElementById('btnQuickCalculator')?.addEventListener('click', function() {
                navigateTo('calculator');
            });
            
            document.getElementById('btnQuickHistory')?.addEventListener('click', function() {
                navigateTo('history');
            });
            
            document.getElementById('btnQuickRisk')?.addEventListener('click', function() {
                navigateTo('risk');
            });
            
            // Risk management buttons
            document.getElementById('btnResetManual')?.addEventListener('click', resetAllCounters);
            document.getElementById('btnResetDaily')?.addEventListener('click', resetAllCounters);
            document.getElementById('btnResetAllCounters')?.addEventListener('click', resetAllCounters);
            document.getElementById('btnResetPeakBalance')?.addEventListener('click', resetPeakBalance);
            
            // Risk warning modal buttons
            document.getElementById('btnCancelRisk')?.addEventListener('click', function() {
                document.getElementById('riskWarningModal').classList.remove('show');
                pendingCalculation = null;
                showToast('Trade dibatalkan karena risiko tinggi.');
            });
            
            document.getElementById('btnProceedRisk')?.addEventListener('click', function() {
                document.getElementById('riskWarningModal').classList.remove('show');
                if (pendingCalculation) {
                    // Simulate proceeding with calculation
                    showToast('⚠️ Trade dilanjutkan meskipun ada peringatan risiko.');
                    pendingCalculation = null;
                }
            });
            
            // Close risk warning modal when clicking outside
            document.getElementById('riskWarningModal')?.addEventListener('click', function(e) {
                if (e.target === this) {
                    this.classList.remove('show');
                    pendingCalculation = null;
                }
            });
            
            // Initialize today's date
            document.getElementById('todayDate').textContent = getTodayDate();
            document.getElementById('weekRange').textContent = `Minggu: ${getWeekRange()}`;
            
            // Set initial peak balance if not set
            const initialBalance = parseFloat(localStorage.getItem('initialBalance') || '0');
            if (initialBalance > 0 && !localStorage.getItem('peakBalance')) {
                localStorage.setItem('peakBalance', initialBalance.toString());
            }
            
            // Update overview data
            updateOverviewData();
            
            // Auto-update overview every minute
            setInterval(updateOverviewData, 60000);
        });

        // ===== RESIZE HANDLER =====
        window.addEventListener('resize', function() {
            if (window.innerWidth > 1024) {
                document.getElementById('sidebar').classList.remove('show');
            }
        });

        // Initialize with overview page
        navigateTo('overview');
    </script>
